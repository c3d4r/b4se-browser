<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1e293b;
      font-size: 13px;
      font-weight: 600;
      color: #38bdf8;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header .meta { color: #475569; font-weight: 400; font-size: 11px; }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg a { color: #22d3ee; }
    .msg code {
      background: rgba(0,0,0,0.3);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
      color: #2dd4bf;
      font-family: ui-monospace, monospace;
    }
    .msg pre {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 6px 0;
    }
    .msg pre code {
      background: none;
      padding: 0;
      font-size: 12px;
    }

    .msg.user {
      align-self: flex-end;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-bottom-right-radius: 4px;
      color: #e2e8f0;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e293b;
      border: 1px solid #334155;
      border-bottom-left-radius: 4px;
      color: #cbd5e1;
    }

    .msg .time {
      display: block;
      font-size: 10px;
      color: #475569;
      margin-top: 4px;
    }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 0;
      font-size: 12px;
      color: #475569;
    }
    .typing .dot {
      width: 6px; height: 6px;
      background: #38bdf8;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* Input area */
    .input-area {
      padding: 10px 12px 28px;
      border-top: 1px solid #1e293b;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(12px);
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 4px 4px 4px 14px;
    }
    .input-row textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      padding: 8px 0;
      line-height: 1.4;
    }
    .input-row textarea::placeholder { color: #475569; }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: #0ea5e9;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 150ms;
    }
    .send-btn:hover { background: #38bdf8; }
    .send-btn:disabled { background: #334155; color: #475569; cursor: default; }

    /* Status dot */
    .status {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .status.connected { background: #4ade80; }
    .status.disconnected { background: #f87171; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <span>Chat <span class="status connected" id="status"></span></span>
    <span class="meta">claude-code relay</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Message Claude..."
        oninput="this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">&#8593;</button>
    </div>
  </div>

  <script>
    const API = location.origin;
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');

    let knownCount = 0;
    let polling = false;

    // Render a message
    function renderMsg(m) {
      const div = document.createElement('div');
      div.className = 'msg ' + m.role;

      // Basic markdown: bold, code blocks, inline code, links
      let html = escapeHtml(m.text);
      // Code blocks
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Italic
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = new Date(m.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      div.innerHTML = html;
      div.appendChild(time);
      messagesEl.appendChild(div);
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Poll for new messages
    async function poll() {
      if (polling) return;
      polling = true;
      try {
        const r = await fetch(API + '/messages');
        if (!r.ok) throw new Error();
        statusEl.className = 'status connected';
        const msgs = await r.json();
        if (msgs.length > knownCount) {
          for (let i = knownCount; i < msgs.length; i++) {
            renderMsg(msgs[i]);
          }
          knownCount = msgs.length;
          scrollBottom();
        }
      } catch (e) {
        statusEl.className = 'status disconnected';
      }
      polling = false;
    }

    // Send message
    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      try {
        await fetch(API + '/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        // Immediately poll to show our own message
        await poll();
      } catch (e) {
        statusEl.className = 'status disconnected';
      }
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // Enter to send, Shift+Enter for newline
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // Poll every second
    poll();
    setInterval(poll, 1000);
    inputEl.focus();
  </script>
</body>
</html>
